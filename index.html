<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f6f1e8" />
  <title>數獨皮小敏花園</title>
  
  <style>
    :root {
      --bg: #d9f1c9;
      --panel: rgba(255, 252, 244, 0.94);
      --ink: #33462a;
      --muted: #66795e;
      --line: #a7b58f;
      --line-strong: #62784e;
      --accent: #7fb95a;
      --accent-soft: #dff2c9;
      --peer: #eef7df;
      --same: #f7e8a9;
      --error: #bc5f4f;
      --error-soft: #fde4da;
      --success: #4d8b45;
      --given: #2f4131;
      --shadow: 0 20px 50px rgba(65, 97, 52, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,.88), transparent 18%),
        radial-gradient(circle at 82% 18%, rgba(255, 241, 184, .65), transparent 20%),
        radial-gradient(circle at 18% 90%, rgba(165, 214, 126, .42), transparent 26%),
        linear-gradient(180deg, #dff7ff 0%, #ecf9dd 30%, #d4efb8 62%, #c4e39d 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: .45;
      border-radius: 50%;
    }

    body::before {
      width: 220px;
      height: 220px;
      left: -30px;
      bottom: -50px;
      background:
        radial-gradient(circle at 32% 42%, rgba(112, 170, 81, .24), transparent 42%),
        radial-gradient(circle at 72% 70%, rgba(255, 223, 122, .32), transparent 30%);
    }

    body::after {
      width: 180px;
      height: 180px;
      right: 10px;
      top: 20px;
      background: radial-gradient(circle at 50% 50%, rgba(245, 209, 93, .3), transparent 62%);
    }

    button, select { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,.9);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 24px;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: auto auto -24px -24px;
      width: 170px;
      height: 170px;
      background:
        radial-gradient(circle at 32% 42%, rgba(112, 170, 81, .24), transparent 42%),
        radial-gradient(circle at 72% 70%, rgba(255, 223, 122, .32), transparent 30%);
      border-radius: 50%;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand h1::before {
      content: "🌱";
      font-size: 1.2em;
      transform: rotate(-10deg);
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    select, .ghost-btn {
      min-height: 44px;
      border: 2px solid #d8e8c0;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      padding: 0 14px;
      color: var(--ink);
      box-shadow: 0 6px 12px rgba(120, 150, 85, .08);
    }

    .ghost-btn:hover, select:hover {
      background: #fffdf4;
      transform: translateY(-1px);
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .status-row.single-status {
      grid-template-columns: minmax(120px, 180px);
      justify-content: center;
    }

    .status-card {
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(242,249,230,.92));
      border: 2px solid #dce9c9;
      border-radius: 20px;
      padding: 10px 12px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(104, 141, 88, .08);
    }

    .status-card span {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: 4px;
    }

    .status-card strong {
      font-size: 1rem;
      color: var(--success);
    }

    .board-wrap {
      display: grid;
      place-items: center;
    }

    .board {
      width: min(100%, 570px);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      border: 7px solid var(--line-strong);
      border-radius: 28px;
      overflow: hidden;
      background: #fbfff4;
      box-shadow: 0 14px 28px rgba(73, 100, 54, .15);
      position: relative;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 248, .94);
      user-select: none;
      transition: background .14s ease, transform .12s ease, box-shadow .14s ease;
      min-width: 0;
      min-height: 0;
    }

    .cell:nth-child(9n) { border-right: 0; }
    .cell:nth-child(n+73) { border-bottom: 0; }

    .cell[data-col="2"], .cell[data-col="5"] {
      border-right: 6px solid var(--line-strong);
    }

    .cell[data-row="2"], .cell[data-row="5"] {
      border-bottom: 6px solid var(--line-strong);
    }

    .cell.peer { background: var(--peer); }
    .cell.same-number { background: var(--same); }

    .cell.selected {
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 4px var(--accent);
      z-index: 2;
    }

    .cell.conflict {
      background: #f8e7a7 !important;
      box-shadow: inset 0 0 0 4px #d6ad3e;
      z-index: 3;
    }

    .cell.error {
      background: var(--error-soft);
      color: var(--error);
      animation: shake .28s ease;
    }

    .cell.given .main-number {
      color: var(--given);
      font-weight: 900;
    }

    .cell.user-value .main-number {
      color: #6e8f4d;
      font-weight: 800;
    }

    .main-number {
      font-size: clamp(1.18rem, 5vw, 2rem);
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,.4);
    }

    .notes {
      position: absolute;
      inset: 4px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      font-size: clamp(.45rem, 1.5vw, .72rem);
      color: #60727f;
      pointer-events: none;
    }

    .note {
      display: grid;
      place-items: center;
      line-height: 1;
    }



    .number-pad {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 8px;
    }

    .number-btn {
      min-height: 52px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fffdf4, #edf9db);
      border: 2px solid #dce9c8;
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--ink);
      box-shadow: 0 8px 16px rgba(110, 144, 82, .08);
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }

    .number-btn:hover {
      background: linear-gradient(180deg, #fffef8, #e4f4c8);
      transform: translateY(-2px);
      box-shadow: 0 12px 18px rgba(110, 144, 82, .12);
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .action-btn {
      min-height: 48px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #eef8e1);
      border: 2px solid #d6e8bc;
      font-weight: 800;
      box-shadow: 0 8px 16px rgba(110, 144, 82, .08);
    }

    .action-btn.active {
      background: linear-gradient(180deg, #95cc66, #6fb04d);
      color: white;
      border-color: transparent;
    }

    .action-btn:hover {
      filter: brightness(.99);
      transform: translateY(-1px);
    }

    .footer-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .primary-btn, .secondary-btn {
      flex: 1;
      min-height: 50px;
      border-radius: 20px;
      font-weight: 900;
      box-shadow: 0 10px 18px rgba(102, 138, 76, .1);
    }

    .primary-btn {
      background: linear-gradient(180deg, #8fcf61, #67a84b);
      color: white;
    }

    .secondary-btn {
      background: linear-gradient(180deg, #fffef7, #f0f8e3);
      border: 2px solid #d7e7c0;
    }

    .message {
      min-height: 24px;
      margin: 14px 2px 0;
      text-align: center;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.5;
    }

    .message.success {
      color: var(--success);
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(48, 68, 42, .32);
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 20;
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(100%, 420px);
      background: linear-gradient(180deg, #fffef9, #f0f8e4);
      border: 2px solid #e5f0d4;
      border-radius: 30px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 25px 70px rgba(46, 67, 38, .22);
    }

    .modal-card h2 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      color: var(--success);
    }

    .modal-card p {
      color: var(--muted);
      line-height: 1.7;
    }

    .modal-stats {
      margin: 18px 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .modal-stats.single-modal-stat {
      grid-template-columns: minmax(120px, 180px);
      justify-content: center;
    }

    .modal-stats div {
      background: rgba(255,255,255,.8);
      border: 2px solid #e0eccd;
      border-radius: 16px;
      padding: 12px 6px;
    }

    .modal-stats strong, .modal-stats span {
      display: block;
    }

    .modal-stats span {
      color: var(--muted);
      font-size: .75rem;
      margin-bottom: 4px;
    }



    .ranking {
      margin-top: 20px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.78);
      border: 2px solid #e0eccd;
      text-align: left;
    }

    .ranking h3 {
      margin: 0 0 10px;
      text-align: center;
      color: var(--success);
      font-size: 1.05rem;
    }

    .ranking-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .ranking-list li {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 14px;
      background: #f6faef;
      font-weight: 800;
    }

    .ranking-list li.current-score {
      background: #eef3bf;
      box-shadow: inset 0 0 0 2px #c9d870;
    }

    .ranking-rank {
      font-size: 1.15rem;
      text-align: center;
    }

    .ranking-time {
      color: var(--success);
      font-variant-numeric: tabular-nums;
    }

    .ranking-empty {
      text-align: center;
      color: var(--muted);
      padding: 10px 0;
    }


    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 22px;
      align-items: start;
    }

    .board-wrap {
      display: grid;
      place-items: center;
      min-width: 0;
    }

    .controls {
      margin-top: 0;
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .timer-start-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .timer-display {
      min-height: 50px;
      display: grid;
      place-items: center;
      border: 2px solid #d8e8c0;
      border-radius: 18px;
      background: linear-gradient(180deg, #fffef8, #edf8df);
      color: var(--ink);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 6px 12px rgba(120, 150, 85, .08);
    }

    .start-side-btn {
      min-height: 50px;
      padding: 0 10px;
    }

    .side-number-pad {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .side-number-pad .number-btn {
      min-height: 58px;
    }

    .side-action-row,
    .side-footer-row {
      display: grid;
      gap: 10px;
    }

    .side-footer-row {
      grid-template-columns: 1fr;
    }

    .side-action-row .action-btn,
    .side-footer-row .primary-btn,
    .side-footer-row .secondary-btn {
      width: 100%;
    }

    .message {
      margin-top: 0;
    }

    @media (max-width: 820px) {
      .game-layout {
        grid-template-columns: 1fr;
      }

      .controls {
        width: min(100%, 570px);
        margin-inline: auto;
      }

      .side-number-pad {
        grid-template-columns: repeat(9, 1fr);
        gap: 4px;
      }

      .side-number-pad .number-btn {
        min-height: 45px;
      }

      .side-footer-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      35% { transform: translateX(-4px); }
      70% { transform: translateX(4px); }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
        align-items: start;
      }

      .app {
        padding: 16px;
        border-radius: 24px;
      }

      .topbar { flex-direction: column; }

      .toolbar {
        width: 100%;
        justify-content: stretch;
      }

      .toolbar select, .toolbar button { flex: 1; }

      .status-row { gap: 6px; }

      .status-card { padding: 8px 5px; }

      .board {
        border-width: 5px;
        border-radius: 22px;
      }

      .cell[data-col="2"], .cell[data-col="5"] { border-right-width: 5px; }
      .cell[data-row="2"], .cell[data-row="5"] { border-bottom-width: 5px; }

      .number-pad { gap: 4px; }

      .number-btn {
        min-height: 45px;
        border-radius: 14px;
      }

      .action-row { grid-template-columns: repeat(3, 1fr); }
    }
  </style>

</head>
<body>
  <main class="app" aria-label="數獨小屋遊戲">
    <header class="topbar">
      <div class="brand">
        <h1>數獨皮小敏花園</h1>
        <p>像小小探險隊一樣，在葉子與花朵之間完成數字任務。</p>
        <p>開發者：Suang</p>
      </div>

      <div class="toolbar">
        <select id="difficulty" aria-label="選擇難度">
          <option value="easy">簡單</option>
          <option value="medium">中等</option>
          <option value="hard">困難</option>
        </select>
      </div>
    </header>

<section class="game-layout">
      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="9乘9數獨棋盤"></div>
      </div>

      <aside class="controls" aria-label="遊戲控制區">
        <div class="timer-start-row">
          <div id="timerDisplay" class="timer-display" aria-label="遊戲時間">00:00</div>
          <button id="startBtn" class="primary-btn start-side-btn" type="button">▶ 開始</button>
        </div>

        <div id="numberPad" class="number-pad side-number-pad" aria-label="數字鍵盤"></div>

        <div class="side-action-row">
          <button id="answerBtn" class="action-btn" type="button">👁 查看答案</button>
        </div>

        <div class="side-footer-row">
          <button id="resetBtn" class="secondary-btn" type="button">回到起點</button>
          <button id="newGameBtn" class="secondary-btn" type="button">開始新冒險</button>
        </div>

        <p id="message" class="message" aria-live="polite">按下「開始」後，計時與作答才會啟動。</p>
      </aside>
    </section>
  </main>

  <div id="completeModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
    <div class="modal-card">
      <h2 id="completeTitle">任務完成 🌼</h2>
      <p>小小探險隊順利完成任務，花園裡的數字也排好隊了。</p>

      <div class="modal-stats single-modal-stat">
        <div><span>完成時間</span><strong id="finalTime">00:00</strong></div>
      </div>
</div>

      <section class="ranking" aria-label="最快前三名">
        <h3>🏆 最快前三名</h3>
        <ol id="rankingList" class="ranking-list"></ol>
      </section>

      <button id="playAgainBtn" class="primary-btn" type="button">再玩一題</button>
    </div>
  </div>

  <script>
    "use strict";

    const STORAGE_KEY = "sudoku-nook-save-v1";
    const RANKING_KEY = "sudoku-garden-top-times-v1";

    const PUZZLES = {
      easy: [
        {
          puzzle: "530070000600195000098000060800060003400803001700020006060000280000419005000080079",
          solution: "534678912672195348198342567859761423426853791713924856961537284287419635345286179"
        },
        {
          puzzle: "640080000700216000019000070900070004500904002800030007070000390000521006000090081",
          solution: "645789123783216459219453678961872534537964812824135967172648395398521746456397281"
        },
        {
          puzzle: "570030000400915000012000040200040007600207009300080004040000820000691005000020031",
          solution: "576432198438915762912768543251349687684257319397186254149573826823691475765824931"
        }
      ],
      medium: [
        {
          puzzle: "200080300060070084030500209000105408000000000402706000301007040720040060004010003",
          solution: "245981376169273584837564219976125438513498627482736951391657842728349165654812793"
        },
        {
          puzzle: "300090400070080095040600301000206509000000000503807000402008050830050070005020004",
          solution: "356192487271384695948675321187236549624519738593847162412768953839451276765923814"
        },
        {
          puzzle: "800020700040030026070500801000905602000000000608304000709003060380060040006090007",
          solution: "865129734941837526273546891134985672597612483628374159719453268382761945456298317"
        }
      ],
      hard: [
        {
          puzzle: "000000000000003085001020000000507000004000100090000000500000073002010000000040009",
          solution: "987654321246173985351928746128537694634892157795461832519286473472319568863745219"
        },
        {
          puzzle: "000000000000004096002030000000608000005000200010000000600000084003020000000050001",
          solution: "198765432357284196462139857239648715745913268816572943621397584583421679974856321"
        },
        {
          puzzle: "000000000000007025009080000000503000006000900010000000500000037008090000000060001",
          solution: "123456789864937125759182364982573416476218953315649278591824637638791542247365891"
        }
      ]
    };

    const state = {
      difficulty: "easy",
      puzzle: "",
      solution: "",
      values: Array(81).fill(""),
      notes: Array.from({ length: 81 }, () => []),
      selected: null,
      noteMode: false,
      mistakes: 0,
      hints: 0,
      elapsed: 0,
      history: [],
      sound: true,
      completed: false,
      started: false,
      paused: true,
      hintHighlights: [],
      showingAnswer: false,
      answerBackup: null,
      timerId: null
    };

    const boardEl = document.getElementById("board");
    const numberPadEl = document.getElementById("numberPad");
    const messageEl = document.getElementById("message");
    const difficultyEl = document.getElementById("difficulty");
    const modalEl = document.getElementById("completeModal");
    const answerBtn = document.getElementById("answerBtn");
    const timerDisplay = document.getElementById("timerDisplay");
    const rankingListEl = document.getElementById("rankingList");
    const startBtn = document.getElementById("startBtn");

    function createBoard() {
      boardEl.innerHTML = "";
      for (let i = 0; i < 81; i++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cell";
        cell.dataset.index = i;
        cell.dataset.row = Math.floor(i / 9);
        cell.dataset.col = i % 9;
        cell.setAttribute("role", "gridcell");
        cell.setAttribute("aria-label", `第 ${Math.floor(i / 9) + 1} 列，第 ${(i % 9) + 1} 欄`);
        cell.addEventListener("click", () => selectCell(i));
        boardEl.appendChild(cell);
      }
    }

    function createNumberPad() {
      numberPadEl.innerHTML = "";
      for (let n = 1; n <= 9; n++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "number-btn";
        btn.textContent = n;
        btn.setAttribute("aria-label", `填入數字 ${n}`);
        btn.addEventListener("click", () => inputNumber(String(n)));
        numberPadEl.appendChild(btn);
      }
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
      const seconds = (totalSeconds % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function startTimer() {
      clearInterval(state.timerId);
      updateTimerButton();

      state.timerId = setInterval(() => {
        if (state.started && !state.completed && !state.paused) {
          state.elapsed++;
          updateTimerButton();

          if (state.elapsed % 5 === 0) {
            saveGame();
          }
        }
      }, 1000);
    }

    function updateTimerButton() {
      timerDisplay.textContent = formatTime(state.elapsed);

      if (!state.started) {
        startBtn.textContent = "▶ 開始";
        return;
      }

      startBtn.textContent = state.paused ? "▶ 繼續" : "⏸ 暫停";
    }

    function startOrPauseGame() {
      if (state.completed) return;

      if (!state.started) {
        state.started = true;
        state.paused = false;
        message("計時開始，花園探險出發。");
      } else {
        state.paused = !state.paused;
        message(state.paused ? "計時已暫停。" : "計時繼續。");
      }

      updateTimerButton();
      saveGame();
    }


    function beep(frequency = 520, duration = 0.06) {
      if (!state.sound) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContextClass();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.045, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch (_) {
        // 某些瀏覽器會阻擋音效，不影響遊戲。
      }
    }

    function pickPuzzle(difficulty) {
      const list = PUZZLES[difficulty];
      return list[Math.floor(Math.random() * list.length)];
    }

    function newGame(difficulty = difficultyEl.value) {
      const item = pickPuzzle(difficulty);
      state.difficulty = difficulty;
      state.puzzle = item.puzzle;
      state.solution = item.solution;
      state.values = item.puzzle.split("").map(v => v === "0" ? "" : v);
      state.notes = Array.from({ length: 81 }, () => []);
      state.selected = null;
      state.mistakes = 0;
      state.hints = 0;
      state.elapsed = 0;
      state.history = [];
      state.completed = false;
      state.started = false;
      state.paused = true;
      state.hintHighlights = [];
      state.showingAnswer = false;
      state.answerBackup = null;
      answerBtn.textContent = "👁 查看答案";
      difficultyEl.value = difficulty;
      modalEl.classList.remove("open");
      message("按下「開始」後，計時與作答才會啟動。");
      updateStatus();
      renderBoard();
      saveGame();
      startTimer();
    }

    function resetGame() {
      state.values = state.puzzle.split("").map(v => v === "0" ? "" : v);
      state.notes = Array.from({ length: 81 }, () => []);
      state.selected = null;
      state.mistakes = 0;
      state.hints = 0;
      state.elapsed = 0;
      state.history = [];
      state.completed = false;
      state.started = false;
      state.paused = true;
      state.hintHighlights = [];
      state.showingAnswer = false;
      state.answerBackup = null;
      answerBtn.textContent = "👁 查看答案";
      message("棋盤已恢復原貌。");
      updateStatus();
      renderBoard();
      saveGame();
      startTimer();
    }

    function selectCell(index) {
      state.selected = index;
      renderBoard();
    }

    function isGiven(index) {
      return state.puzzle[index] !== "0";
    }

    function sameBox(a, b) {
      const ar = Math.floor(a / 9), ac = a % 9;
      const br = Math.floor(b / 9), bc = b % 9;
      return Math.floor(ar / 3) === Math.floor(br / 3) &&
             Math.floor(ac / 3) === Math.floor(bc / 3);
    }



    function isValidCompletedGrid(grid) {
      if (!grid || grid.length !== 81) return false;
      const target = "123456789";

      function isOneToNine(chars) {
        return [...chars].sort().join("") === target;
      }

      for (let row = 0; row < 9; row++) {
        if (!isOneToNine(grid.slice(row * 9, row * 9 + 9))) return false;
      }

      for (let col = 0; col < 9; col++) {
        let values = "";
        for (let row = 0; row < 9; row++) {
          values += grid[row * 9 + col];
        }
        if (!isOneToNine(values)) return false;
      }

      for (let boxRow = 0; boxRow < 3; boxRow++) {
        for (let boxCol = 0; boxCol < 3; boxCol++) {
          let values = "";
          for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 3; col++) {
              const index = (boxRow * 3 + row) * 9 + (boxCol * 3 + col);
              values += grid[index];
            }
          }
          if (!isOneToNine(values)) return false;
        }
      }

      return true;
    }

    function findConflicts(index, number) {
      const conflicts = [];
      const row = Math.floor(index / 9);
      const col = index % 9;

      for (let i = 0; i < 81; i++) {
        if (i === index || state.values[i] !== number) continue;

        const sameRow = Math.floor(i / 9) === row;
        const sameCol = i % 9 === col;
        const sameGrid = sameBox(i, index);

        if (sameRow || sameCol || sameGrid) {
          conflicts.push(i);
        }
      }

      return conflicts;
    }

    function getCandidates(index) {
      if (isGiven(index)) return [];

      const used = new Set();
      const row = Math.floor(index / 9);
      const col = index % 9;

      for (let i = 0; i < 81; i++) {
        if (!state.values[i]) continue;

        const sameRow = Math.floor(i / 9) === row;
        const sameCol = i % 9 === col;
        const sameGrid = sameBox(i, index);

        if (sameRow || sameCol || sameGrid) {
          used.add(state.values[i]);
        }
      }

      return ["1","2","3","4","5","6","7","8","9"].filter(n => !used.has(n));
    }

    function showConflict(index, conflicts) {
      state.hintHighlights = [index, ...conflicts];
      renderBoard();

      const enteredCell = boardEl.children[index];
      if (enteredCell) enteredCell.classList.add("error");

      setTimeout(() => {
        state.values[index] = "";
        state.hintHighlights = [];
        state.showingAnswer = false;
        state.answerBackup = null;
        answerBtn.textContent = "👁 查看答案";
        renderBoard();
        saveGame();
      }, 650);
    }

    function pushHistory() {
      state.history.push({
        values: [...state.values],
        notes: state.notes.map(arr => [...arr]),
        mistakes: state.mistakes,
        hints: state.hints
      });
      if (state.history.length > 50) state.history.shift();
    }

    function inputNumber(number) {
      const index = state.selected;
      if (!state.started) {
        message("請先按下「開始」按鈕。");
        return;
      }

      if (state.showingAnswer) {
        message("目前正在查看答案，請先返回作答畫面。");
        return;
      }

      if (index === null || isGiven(index) || state.completed) {
        message("先選擇一個可以填寫的空格。");
        return;
      }

      const previousValue = state.values[index];
      state.values[index] = "";
      const conflicts = findConflicts(index, number);
      state.values[index] = previousValue;

      pushHistory();
      state.notes[index] = [];
      state.values[index] = number;

      if (conflicts.length > 0) {
        state.mistakes++;
        beep(180, .1);
        message(`數字 ${number} 與同一行、同一列或九宮格中的數字重複，已自動移除。`);
        updateStatus();
        showConflict(index, conflicts);
        return;
      }

      if (number !== state.solution[index]) {
        state.mistakes++;
        beep(180, .1);
        message("這個位置不適合放這個數字，已自動移除。");
        updateStatus();
        showConflict(index, []);
        return;
      }

      state.hintHighlights = [];
      clearRelatedNotes(index, number);
      beep(620);
      message("放得漂亮。");
      renderBoard();
      checkCompletion();
      updateStatus();
      saveGame();
    }

    function eraseCell() {
      if (!state.started) {
        message("請先按下「開始」按鈕。");
        return;
      }

      if (state.showingAnswer) {
        message("目前正在查看答案，請先返回作答畫面。");
        return;
      }
      const index = state.selected;
      if (index === null || isGiven(index) || state.completed) return;
      pushHistory();
      state.values[index] = "";
      state.notes[index] = [];
      message("已清除這一格。");
      renderBoard();
      saveGame();
    }

    function undo() {
      const previous = state.history.pop();
      if (!previous || state.completed) {
        message("目前沒有可以復原的步驟。");
        return;
      }
      state.values = previous.values;
      state.notes = previous.notes;
      state.mistakes = previous.mistakes;
      state.hints = previous.hints;
      updateStatus();
      renderBoard();
      saveGame();
      message("已回到上一步。");
    }

    function giveHint() {
      if (!state.started) {
        message("請先按下「開始」按鈕。");
        return;
      }

      if (state.showingAnswer) {
        message("目前已顯示答案。");
        return;
      }
      if (state.completed) return;

      const index = state.selected;
      if (index === null || isGiven(index)) {
        message("先點選一個空白格，我再幫你縮小範圍。");
        return;
      }

      const candidates = getCandidates(index);
      const row = Math.floor(index / 9);
      const col = index % 9;
      const related = [];

      for (let i = 0; i < 81; i++) {
        const sameRow = Math.floor(i / 9) === row;
        const sameCol = i % 9 === col;
        const sameGrid = sameBox(i, index);

        if (i !== index && state.values[i] && (sameRow || sameCol || sameGrid)) {
          related.push(i);
        }
      }

      state.hintHighlights = related;
      state.hints++;
      updateStatus();
      renderBoard();
      beep(700);

      if (candidates.length === 0) {
        message("這格目前沒有合法數字，請先檢查周圍是否有重複。");
      } else if (candidates.length === 1) {
        message("這格只剩一個可能。請觀察黃色標示的同行、同列與九宮格數字。");
      } else {
        message(`這格可排除大部分數字，目前還有 ${candidates.length} 個可能。請觀察黃色標示的數字。`);
      }

      setTimeout(() => {
        state.hintHighlights = [];
        renderBoard();
      }, 2200);

      saveGame();
    }

    function toggleAnswer() {
      if (state.completed) return;

      if (!state.started) {
        message("請先按下「開始」按鈕。");
        return;
      }

      if (!state.showingAnswer) {
        if (!isValidCompletedGrid(state.solution)) {
          message("這題的答案資料異常，請按「新遊戲」更換題目。");
          return;
        }

        state.answerBackup = {
          values: [...state.values],
          notes: state.notes.map(arr => [...arr]),
          selected: state.selected
        };

        state.elapsed += 30;
        updateTimerButton();
        state.values = state.solution.split("");
        state.notes = Array.from({ length: 81 }, () => []);
        state.selected = null;
        state.showingAnswer = true;
        answerBtn.textContent = "↩ 返回作答";
        message("目前顯示正確答案，已加 30 秒，計時仍會繼續。");
      } else {
        if (state.answerBackup) {
          state.values = [...state.answerBackup.values];
          state.notes = state.answerBackup.notes.map(arr => [...arr]);
          state.selected = state.answerBackup.selected;
          updateTimerButton();
        }

        state.showingAnswer = false;
        state.answerBackup = null;
        answerBtn.textContent = "👁 查看答案";
        message("已返回原本作答畫面。");
      }

      renderBoard();
    }

    function clearRelatedNotes(index, number) {
      const row = Math.floor(index / 9);
      const col = index % 9;

      for (let i = 0; i < 81; i++) {
        const sameRow = Math.floor(i / 9) === row;
        const sameCol = i % 9 === col;
        if (sameRow || sameCol || sameBox(i, index)) {
          state.notes[i] = state.notes[i].filter(n => n !== number);
        }
      }
    }

    function flashError(index) {
      requestAnimationFrame(() => {
        const el = boardEl.children[index];
        if (!el) return;
        el.classList.add("error");
        setTimeout(() => el.classList.remove("error"), 380);
      });
    }

    function renderBoard() {
      const selectedValue = state.selected !== null ? state.values[state.selected] : "";

      [...boardEl.children].forEach((cell, index) => {
        cell.className = "cell";
        cell.innerHTML = "";

        const row = Math.floor(index / 9);
        const col = index % 9;

        if (state.selected !== null) {
          const selectedRow = Math.floor(state.selected / 9);
          const selectedCol = state.selected % 9;

          if (row === selectedRow || col === selectedCol || sameBox(index, state.selected)) {
            cell.classList.add("peer");
          }
          if (selectedValue && state.values[index] === selectedValue) {
            cell.classList.add("same-number");
          }
          if (index === state.selected) {
            cell.classList.add("selected");
          }
        }

        if (state.hintHighlights.includes(index)) {
          cell.classList.add("conflict");
        }

        if (state.showingAnswer) {
          cell.classList.add("given");
        } else if (isGiven(index)) {
          cell.classList.add("given");
        } else if (state.values[index]) {
          cell.classList.add("user-value");
        }

        if (state.values[index]) {
          const span = document.createElement("span");
          span.className = "main-number";
          span.textContent = state.values[index];
          cell.appendChild(span);
        } else if (state.notes[index].length) {
          const notes = document.createElement("div");
          notes.className = "notes";
          for (let n = 1; n <= 9; n++) {
            const note = document.createElement("span");
            note.className = "note";
            note.textContent = state.notes[index].includes(String(n)) ? n : "";
            notes.appendChild(note);
          }
          cell.appendChild(notes);
        }
      });
    }

    function updateStatus() {
      updateTimerButton();
    }

    function checkCompletion() {
      const solved = state.values.every((value, index) => value === state.solution[index]);
      if (!solved) return;

      state.completed = true;
      state.paused = true;
      updateTimerButton();
      clearInterval(state.timerId);
      updateStatus();
      message("完成！九宮格正在鼓掌。", true);
      document.getElementById("finalTime").textContent = formatTime(state.elapsed);
      saveRanking(state.elapsed);
      renderRanking(state.elapsed);
      modalEl.classList.add("open");
      beep(840, .16);
      localStorage.removeItem(STORAGE_KEY);
    }

    function message(text, success = false) {
      messageEl.textContent = text;
      messageEl.classList.toggle("success", success);
    }


    function getRankings() {
      try {
        const raw = localStorage.getItem(RANKING_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed)
          ? parsed.filter(item => Number.isInteger(item.time) && item.time >= 0)
          : [];
      } catch (_) {
        return [];
      }
    }

    function saveRanking(seconds) {
      const rankings = getRankings();
      rankings.push({
        time: seconds,
        difficulty: state.difficulty,
        createdAt: Date.now()
      });

      rankings.sort((a, b) => a.time - b.time || a.createdAt - b.createdAt);
      localStorage.setItem(RANKING_KEY, JSON.stringify(rankings.slice(0, 3)));
    }

    function difficultyLabel(value) {
      const labels = {
        easy: "簡單",
        medium: "中等",
        hard: "困難"
      };
      return labels[value] || value;
    }

    function renderRanking(currentTime = null) {
      const rankings = getRankings()
        .sort((a, b) => a.time - b.time || a.createdAt - b.createdAt)
        .slice(0, 3);

      rankingListEl.innerHTML = "";

      if (!rankings.length) {
        const empty = document.createElement("li");
        empty.className = "ranking-empty";
        empty.textContent = "完成第一題後，最快紀錄會出現在這裡。";
        rankingListEl.appendChild(empty);
        return;
      }

      const medals = ["🥇", "🥈", "🥉"];

      rankings.forEach((item, index) => {
        const li = document.createElement("li");

        if (currentTime !== null && item.time === currentTime) {
          li.classList.add("current-score");
        }

        const rank = document.createElement("span");
        rank.className = "ranking-rank";
        rank.textContent = medals[index];

        const detail = document.createElement("span");
        detail.textContent = difficultyLabel(item.difficulty);

        const time = document.createElement("span");
        time.className = "ranking-time";
        time.textContent = formatTime(item.time);

        li.append(rank, detail, time);
        rankingListEl.appendChild(li);
      });
    }

    function saveGame() {
      if (state.completed) return;
      const data = {
        difficulty: state.difficulty,
        puzzle: state.puzzle,
        solution: state.solution,
        values: state.values,
        notes: state.notes,
        selected: state.selected,
        mistakes: state.mistakes,
        hints: state.hints,
        elapsed: state.elapsed,
        started: state.started,
        paused: state.paused,
        sound: state.sound
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadGame() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;

      try {
        const data = JSON.parse(raw);
        if (!data.puzzle || !data.solution || !Array.isArray(data.values)) return false;

        const validSavedPuzzle = Object.values(PUZZLES)
          .flat()
          .some(item => item.puzzle === data.puzzle && item.solution === data.solution);

        if (!validSavedPuzzle || !isValidCompletedGrid(data.solution)) {
          localStorage.removeItem(STORAGE_KEY);
          return false;
        }

        Object.assign(state, data);
        if (typeof state.started !== "boolean") state.started = state.elapsed > 0;
        if (!state.started) state.paused = true;
        state.history = [];
        state.hintHighlights = [];
        state.completed = false;
        difficultyEl.value = state.difficulty;
        updateStatus();
        renderBoard();
        message("已接續上次的棋局。");
        startTimer();
        return true;
      } catch (_) {
        return false;
      }
    }

    answerBtn.addEventListener("click", toggleAnswer);
    startBtn.addEventListener("click", startOrPauseGame);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("newGameBtn").addEventListener("click", () => newGame());
    document.getElementById("playAgainBtn").addEventListener("click", () => newGame());

    difficultyEl.addEventListener("change", () => newGame(difficultyEl.value));

    document.addEventListener("keydown", event => {
      if (/^[1-9]$/.test(event.key)) inputNumber(event.key);

      if (state.selected !== null && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
        event.preventDefault();
        let next = state.selected;
        if (event.key === "ArrowUp") next = Math.max(0, next - 9);
        if (event.key === "ArrowDown") next = Math.min(80, next + 9);
        if (event.key === "ArrowLeft") next = Math.max(0, next - 1);
        if (event.key === "ArrowRight") next = Math.min(80, next + 1);
        selectCell(next);
      }
    });

    createBoard();
    createNumberPad();
    renderRanking();

    if (!loadGame()) {
      newGame("easy");
    }
  </script>
</body>
